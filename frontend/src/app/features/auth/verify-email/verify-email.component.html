<div class="verify-container">
  <div class="verify-card">
    <div class="icon-wrapper" *ngIf="!loading">
      <i class="fas" [ngClass]="success ? 'fa-check-circle success-icon' : 'fa-times-circle error-icon'"></i>
    </div>

    <div class="spinner" *ngIf="loading">
      <i class="fas fa-spinner fa-spin"></i>
    </div>

    <h1 *ngIf="loading">Verifying Your Email...</h1>
    <h1 *ngIf="!loading && success">Email Verified! ✓</h1>
    <h1 *ngIf="!loading && !success">Verification Failed</h1>

    <p *ngIf="loading">Please wait while we verify your email address.</p>
    
    <p *ngIf="success">
      Your email has been successfully verified. You can now log in to your account.
    </p>

    <p *ngIf="!loading && !success" class="error-message">
      {{ error }}
    </p>

    <div class="actions" *ngIf="!loading">
      <button *ngIf="success" class="btn btn-primary" (click)="goToLogin()">
        Go to Login
      </button>
      <button *ngIf="!success" class="btn btn-secondary" (click)="goToLogin()">
        Back to Login
      </button>
    </div>
  </div>
</div>
