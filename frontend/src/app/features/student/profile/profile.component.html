<div class="dashboard-page">
  <div class="container container-sm">
    <h1 style="margin-bottom:var(--space-2xl)">My Profile</h1>
    <div class="profile-card">
      <div class="avatar-section">
        <div class="avatar-circle">{{ getInitials() }}</div>
        <div>
          <h3>{{ authService.currentUser?.fullName }}</h3>
          <span class="role-tag">{{ authService.currentUser?.role }}</span>
        </div>
      </div>
      <form [formGroup]="profileForm" (ngSubmit)="onSave()" class="profile-form">
        <div class="form-field">
          <label class="field-label" for="fullName">Full Name</label>
          <div class="field-wrap"><span class="material-icons">person</span><input id="fullName" type="text" formControlName="fullName" /></div>
        </div>
        <div class="form-field">
          <label class="field-label" for="email">Email <span class="readonly-tag">Read-only</span></label>
          <div class="field-wrap disabled"><span class="material-icons">email</span><input id="email" type="email" formControlName="email" /></div>
        </div>
        <div class="save-row">
          <div class="success-msg" *ngIf="saveSuccess"><span class="material-icons">check_circle</span> Profile updated!</div>
          <button type="submit" class="btn-save" [disabled]="isSaving || profileForm.invalid">
            <span class="material-icons spin" *ngIf="isSaving">refresh</span>
            {{ isSaving ? 'Saving…' : 'Save Changes' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
